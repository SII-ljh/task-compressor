# ============================================================
# Task Compressor — Base config for 8×H200 (141GB HBM3e each)
# ============================================================
# Usage:
#   torchrun --nproc_per_node=8 scripts/train.py --config configs/h200_base.yaml
#
# Override compression ratio:
#   torchrun --nproc_per_node=8 scripts/train.py --config configs/h200_base.yaml \
#       model.n_prompt_tokens=32 model.n_context_tokens=96

model:
  base_model: "models/Qwen3-0.6B"
  lora_rank: 128
  lora_alpha: 128
  lora_target_modules: ["q_proj", "v_proj"]
  lora_dropout: 0.0
  n_prompt_tokens: 16        # n_p (default: 16)
  n_context_tokens: 48       # n_c (default: 48)
  # total soft prompts k = n_p + n_c = 64
  num_perceiver_layers: 2
  perceiver_ffn_mult: 4
  gradient_checkpointing: true

training:
  # ── Batch size ──
  # effective_batch = per_gpu × num_gpus × grad_accum = 32 × 8 × 1 = 256
  per_gpu_batch_size: 32
  gradient_accumulation_steps: 1

  # ── Schedule ──
  # steps_per_epoch = 483813 / 256 ≈ 1890
  # 20000 steps ≈ 10.6 epochs
  warmup_steps: 500
  total_steps: 20000

  # ── Learning rates (differential) ──
  lora_lr: 1.0e-5
  perceiver_lr: 5.0e-5

  # ── Regularization ──
  max_grad_norm: 5.0
  weight_decay: 0.01

  # ── Precision ──
  bf16: true
  deepspeed: null

  # ── Checkpointing ──
  save_steps: 2000            # ~every epoch
  eval_steps: 1000            # ~every 0.5 epoch
  logging_steps: 10
  max_eval_samples: 5000
  num_sample_predictions: 3

  resume_from: null

data:
  max_context_length: 4096
  max_prompt_length: 256
  max_response_length: 512
  train_file: "data/qa_large_train.json"
  dev_file: "data/qa_large_dev.json"
  num_workers: 8              # H200 nodes have plenty of CPU cores

output_dir: "outputs"
wandb_project: "task-compressor"
wandb_run_name: null
seed: 42
