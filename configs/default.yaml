# ============================================================
# Task Compressor  —  Default Configuration
# ============================================================

model:
  base_model: "models/Qwen3-0.6B"
  lora_rank: 128
  lora_alpha: 128
  lora_target_modules: ["q_proj", "v_proj"]
  lora_dropout: 0.0
  n_prompt_tokens: 16      # n_p: prompt-conditioned latent tokens
  n_context_tokens: 48     # n_c: learnable context tokens
  # total soft prompt k = n_p + n_c = 64
  num_perceiver_layers: 2
  perceiver_ffn_mult: 4    # FFN intermediate = hidden_size * mult (0 = use model's intermediate_size)
  gradient_checkpointing: true

training:
  per_gpu_batch_size: 32
  gradient_accumulation_steps: 4
  # effective batch_size = per_gpu * grad_accum = 128 (single GPU)
  warmup_steps: 500
  total_steps: 40000          # ~10.6 epochs over 483K samples @ batch 128
  lora_lr: 1.0e-5
  perceiver_lr: 5.0e-5
  max_grad_norm: 5.0
  weight_decay: 0.01
  bf16: true
  deepspeed: null             # path to deepspeed config, null = DDP
  save_steps: 1000
  eval_steps: 500
  logging_steps: 10
  max_eval_samples: 5000      # cap eval to N samples (0 = all)
  num_sample_predictions: 3   # generate N sample predictions during eval
  resume_from: null           # checkpoint path to resume training

data:
  max_context_length: 4096
  max_prompt_length: 256
  max_response_length: 512
  train_file: "data/qa_train.json"
  dev_file: "data/qa_dev.json"
  num_workers: 4

output_dir: "outputs"
wandb_project: "task-compressor"
wandb_run_name: null
seed: 42
